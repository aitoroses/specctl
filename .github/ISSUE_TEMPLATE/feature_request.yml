name: Feature request
description: Propose a new capability or improvement
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: agent_impact
    attributes:
      label: Agent impact
      description: How would this affect the primary agent-facing workflow?
