name: Bug report
description: Report a defect in specctl
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact steps, commands, or agent workflow that reproduces the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - CLI
        - MCP
        - Skill
        - Dashboard
        - Release/install flow
    validations:
      required: true
