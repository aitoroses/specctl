    - id: D-004
      area: Agent guidance for retract rebind and repair-intent validation
      intent: add
      status: closed
      origin_checkpoint: 6e63dbe47c2e63eef195d590d3522f69792961ca
      current: |-
        Skill teaches the generic governance workflow but does not cover
        when to use delta withdraw vs defer, when to use
        delta rebind-requirements (or how auto-rebind on req replace
        behaves), or how to interpret VALIDATION_FAILED from
        delta add --intent repair. Agents facing those states fall back
        to defer/reopen, producing residue.
      target: |-
        Skill documents the three new escape hatches. (1) delta withdraw
        semantics and when to prefer it over defer. (2) delta
        rebind-requirements plus the auto_rebind_on_replace config. (3)
        Reading and acting on the new VALIDATION_FAILED payload
        (conflicts list plus intent suggestion).
      notes: |
        Companion to specctl:cli Deltas D-008, D-009, D-010 (2026-04-22).
        Keeps the agent-facing surface coherent per CONTRIBUTING.md.
      updates:
        - add_requirement
    - id: D-005
      area: Skill documents observable reason fields and config defaults for governance verbs
      intent: add
      status: closed
      origin_checkpoint: 4dbc6a4afb1364affa5def754826cdd4f103fbbc
      current: |-
        The skill section "Delta escape hatches" introduced in rev 4 tells
        agents WHEN to use withdraw, rebind, and repair validation but does
        not tell them WHERE to observe the reason fields they pass in (both
        result.delta and state.deltas.items for withdraw; result.rebind for
        rebind). It also soft-pedals the auto_rebind_on_replace config
        divergence between fresh specctl init (true) and existing repos
        (false) as a parenthetical, which an upgrading agent is likely to
        miss.
      target: |-
        Skill guidance calls out (1) the exact observable fields for each
        reason payload — state.deltas.items[].withdrawn_reason plus
        result.delta.withdrawn_reason for withdraw; result.rebind.reason
        for rebind on both --to and --remove paths; (2) the config
        divergence as a first-class callout with the recommended inspection
        and flip steps; (3) a concrete walkthrough of the repair-intent
        VALIDATION_FAILED payload — how to read focus.delta_add.conflicts
        and focus.delta_add.suggestion.intent, and the exact retry shape.
      notes: |
        Review feedback on PR #10. Layered on top of REQ-004; the
        high-level workflow guide stays intact and this delta adds a
        details REQ covering observability.
      updates:
        - add_requirement
