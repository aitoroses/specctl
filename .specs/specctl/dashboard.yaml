      area: Go CLI subcommand and REST API
      intent: add
      status: closed
      origin_checkpoint: 28411f7c0e74209beb201e051cf4f7c16ede7c3d
      current: No dashboard subcommand exists in specctl
      target: specctl dashboard generates static HTML; specctl dashboard --serve starts localhost with REST API and file watching
      notes: Two delivery modes static and serve. Go embeds React SPA via go embed.
      updates:
        - add_requirement
    - id: D-002
      area: Vite React SPA foundation
      intent: add
      status: closed
      origin_checkpoint: 28411f7c0e74209beb201e051cf4f7c16ede7c3d
      current: No frontend exists in specctl
      target: Vite React SPA in tools/specctl/dashboard/ with Tailwind CSS dark-first, React Query, React Router for 4 views
      notes: Standalone dark-first design, Inter plus JetBrains Mono, Vercel Linear aesthetic. Open-source release target.
      updates:
        - add_requirement
    - id: D-003
      area: Charter Overview view
      intent: add
      status: closed
      origin_checkpoint: 28411f7c0e74209beb201e051cf4f7c16ede7c3d
      current: No visual representation of charter health
      target: Landing page with charter cards showing aggregated health stats, overall governance summary, glass-effect styling, drill-down navigation
      notes: First view users see. Must communicate governance health at a glance.
      updates:
        - add_requirement
    - id: D-004
      area: Health Heatmap view
      intent: add
      status: closed
      origin_checkpoint: 28411f7c0e74209beb201e051cf4f7c16ede7c3d
      current: No heatmap visualization exists
      target: Color-coded matrix of all specs by charter. Green verified, yellow stale, red unverified. Clickable cells, smooth transitions, clear legend.
      notes: Shows density patterns that overview cards cannot reveal.
      updates:
        - add_requirement
    - id: D-005
      area: Dependency Graph view
      intent: add
      status: closed
      origin_checkpoint: 28411f7c0e74209beb201e051cf4f7c16ede7c3d
      current: No dependency visualization exists
      target: D3 force-directed graph with physics simulation. Nodes are specs colored by health. Edges are depends_on with directional arrows. Drag, zoom, pan, tooltips, click to navigate.
      notes: The wow-factor view. Charter grouping visible as clusters.
      updates:
        - add_requirement
    - id: D-006
      area: Spec Detail view
      intent: add
      status: closed
      origin_checkpoint: 28411f7c0e74209beb201e051cf4f7c16ede7c3d
      current: No spec detail view exists
      target: Full spec breakdown page with deltas, requirements with rendered Gherkin, verification status, lifecycle indicators, document links, changelog
      notes: The deep-dive view. Shows everything about a single spec.
      updates:
        - add_requirement
