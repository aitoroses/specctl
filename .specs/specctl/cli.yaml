    - id: D-004
      area: Duplicate requirement guard
      intent: add
      status: closed
      origin_checkpoint: 7ba37307c794346f5c35cec7cfdd32ab8f04d947
      current: req add allows duplicate Feature titles — two REQ IDs can point at the same heading
      target: req add rejects with REQUIREMENT_ALREADY_TRACKED when a non-withdrawn requirement shares the Feature title
      notes: Dogfood-discovered bug — REQ-015 and REQ-021 both tracked 'Context produces chooser flows' simultaneously
      updates:
        - add_requirement
    - id: D-005
      area: Example subcommand
      intent: add
      status: closed
      origin_checkpoint: 6441fc99221af9b63012ec73d17643ade619cd9d
      current: Agents must read external files to understand specctl's own spec format and tracking structure
      target: specctl example packs SPEC.md, SPEC_FORMAT.md, and .specs/ into a single CLI output the agent can observe directly
      notes: Full ouroboros — the tool's own spec becomes the built-in example. Agent sees a real governed spec without leaving the CLI.
      updates:
        - add_requirement
    - id: D-006
      area: Gherkin tag management
      intent: add
      status: closed
      origin_checkpoint: 6441fc99221af9b63012ec73d17643ade619cd9d
      current: No CLI command to add gherkin tags — agent must hand-edit specctl.yaml mid-workflow
      target: INVALID_GHERKIN_TAG error guides the agent to register missing tags via config add-tag then retry
      notes: Dogfood-discovered friction — agent context-switches to manual YAML editing during req add flow
      updates:
        - add_requirement
    - id: D-007
      area: Design-doc drift guidance
      intent: change
      status: closed
      origin_checkpoint: 6441fc99221af9b63012ec73d17643ade619cd9d
      current: Design-doc drift guidance treats all document drift as semantic until the agent infers otherwise, so checkpoint-only housekeeping is underexplained
      target: Context, diff, and sync guidance explicitly distinguish review-only drift from editorial checkpoint repair, with non-blocking classification and a deliberate re-anchor path
      notes: Dogfood feedback showed agents conflating tool-reported design-doc drift with real semantic divergence and over-escalating optional cleanup as required work
      affects_requirements:
        - REQ-001
        - REQ-002
        - REQ-007
        - REQ-015
        - REQ-020
