    - id: D-003
      area: Full behavioral coverage
      intent: add
      status: closed
      origin_checkpoint: 306afa4854ef3ab7c0f57aa264d57fcda8ef597b
      current: 66 of 139 golden tests are tracked by requirements
      target: All 139 observable behaviors represented in the spec
